<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png">

{% seo %}
    
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">

  </head>

  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
        
        {% if site.logo %}
          <img src="{{site.logo | relative_url}}" alt="Logo" />
        {% endif %}

        <p>{{ site.description | default: site.github.project_tagline }} &mdash; Read my <a href="https://ewenquim.github.io/articles">articles</a></p>

        <p class="view">Download <a style="color:blueviolet" href="https://play.google.com/store/apps/details?id=com.coal">Coalescence</a> for Android</p>

      </header>
      <section>

      {{ content }}

      </section>
      <footer>
        <noscript style="text-align:center"><small>JavaScript is not required tu run entirely this website</small></noscript>
        <p style="text-align:center"><small>Ewen Quimerc'h © 2020 - <script>document.write(new Date().getFullYear())</script><noscript>Current year (compute it yourself, nerd!)</noscript> <small></p>
        <p style="text-align:center"><small><a href="{{ site.base }}/about">About</a> the website</small></p>
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
